spring:
  application:
    name: apvero-platform-server
  servlet:
    multipart:
      max-file-size: ${APVERO_KNOWLEDGE_MAX_SNAPSHOT_BYTES:5242880B}
      max-request-size: ${APVERO_KNOWLEDGE_MAX_MULTIPART_REQUEST_BYTES:6291456B}
  datasource:
    url: ${APVERO_DB_URL:jdbc:postgresql://localhost:5432/apvero}
    username: ${APVERO_DB_USER:apvero}
    password: ${APVERO_DB_PASSWORD:apvero}
    hikari:
      maximum-pool-size: ${APVERO_DB_POOL_SIZE:10}
      minimum-idle: 1
  flyway:
    enabled: true
    validate-migration-naming: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${APVERO_SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
logging:
  level:
    io.apvero: INFO

apvero:
  security:
    mode: ${APVERO_SECURITY_MODE:development}
    bootstrap-token: ${APVERO_BOOTSTRAP_ADMIN_TOKEN:}
  providers:
    real-enabled: ${APVERO_REAL_PROVIDER_ENABLED:false}
    allow-private-endpoints: ${APVERO_ALLOW_PRIVATE_MODEL_ENDPOINTS:false}
  knowledge:
    enabled: ${APVERO_KNOWLEDGE_ENABLED:false}
    worker-base-uri: ${APVERO_KNOWLEDGE_WORKER_BASE_URI:http://ai-worker:8090}
    worker-read-timeout: ${APVERO_KNOWLEDGE_WORKER_READ_TIMEOUT:15s}
    max-worker-response-bytes: ${APVERO_KNOWLEDGE_MAX_WORKER_RESPONSE_BYTES:20971520}
    max-inline-characters: ${APVERO_KNOWLEDGE_MAX_INLINE_CHARACTERS:5242880}
    max-snapshot-bytes: ${APVERO_KNOWLEDGE_MAX_SNAPSHOT_BYTES:5242880}
    max-docx-entries: ${APVERO_KNOWLEDGE_MAX_DOCX_ENTRIES:2048}
    max-docx-expanded-bytes: ${APVERO_KNOWLEDGE_MAX_DOCX_EXPANDED_BYTES:20971520}
    runner:
      enabled: ${APVERO_KNOWLEDGE_RUNNER_ENABLED:true}
      claim-batch: ${APVERO_KNOWLEDGE_RUNNER_CLAIM_BATCH:4}
      concurrency: ${APVERO_KNOWLEDGE_RUNNER_CONCURRENCY:4}
      lease-duration: ${APVERO_KNOWLEDGE_RUNNER_LEASE_DURATION:60s}
      poll-interval: ${APVERO_KNOWLEDGE_RUNNER_POLL_INTERVAL:1s}
      backoff-base: ${APVERO_KNOWLEDGE_RUNNER_BACKOFF_BASE:2s}
      backoff-maximum: ${APVERO_KNOWLEDGE_RUNNER_BACKOFF_MAXIMUM:5m}
      graceful-drain: ${APVERO_KNOWLEDGE_RUNNER_GRACEFUL_DRAIN:30s}
    web-capture:
      max-redirects: ${APVERO_KNOWLEDGE_WEB_MAX_REDIRECTS:5}
      max-header-bytes: ${APVERO_KNOWLEDGE_WEB_MAX_HEADER_BYTES:65536}
      connect-timeout: ${APVERO_KNOWLEDGE_WEB_CONNECT_TIMEOUT:2s}
      read-timeout: ${APVERO_KNOWLEDGE_WEB_READ_TIMEOUT:5s}
