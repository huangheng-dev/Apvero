name: apvero

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: ${APVERO_DB_NAME:-apvero}
      POSTGRES_USER: ${APVERO_DB_USER:-apvero}
      POSTGRES_PASSWORD: ${APVERO_DB_PASSWORD:-apvero}
    volumes:
      - apvero_postgres:/var/lib/postgresql
    ports:
      - "${APVERO_BIND_ADDRESS:-127.0.0.1}:${APVERO_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - backend

  platform-server:
    build:
      context: ../..
      dockerfile: apps/platform-server/Dockerfile
    environment:
      APVERO_DB_URL: jdbc:postgresql://postgres:5432/${APVERO_DB_NAME:-apvero}
      APVERO_DB_USER: ${APVERO_DB_USER:-apvero}
      APVERO_DB_PASSWORD: ${APVERO_DB_PASSWORD:-apvero}
      APVERO_SERVER_PORT: 8080
      APVERO_DEFAULT_LOCALE: ${APVERO_DEFAULT_LOCALE:-en}
      APVERO_SECURITY_MODE: ${APVERO_SECURITY_MODE:-development}
      APVERO_BOOTSTRAP_ADMIN_TOKEN: ${APVERO_BOOTSTRAP_ADMIN_TOKEN:-}
      APVERO_REAL_PROVIDER_ENABLED: ${APVERO_REAL_PROVIDER_ENABLED:-false}
      APVERO_ALLOW_PRIVATE_MODEL_ENDPOINTS: ${APVERO_ALLOW_PRIVATE_MODEL_ENDPOINTS:-false}
      APVERO_KNOWLEDGE_ENABLED: ${APVERO_KNOWLEDGE_ENABLED:-false}
      APVERO_KNOWLEDGE_WORKER_BASE_URI: ${APVERO_KNOWLEDGE_WORKER_BASE_URI:-http://ai-worker:8090}
      APVERO_KNOWLEDGE_WORKER_READ_TIMEOUT: ${APVERO_KNOWLEDGE_WORKER_READ_TIMEOUT:-15s}
      APVERO_KNOWLEDGE_MAX_WORKER_RESPONSE_BYTES: ${APVERO_KNOWLEDGE_MAX_WORKER_RESPONSE_BYTES:-20971520}
      APVERO_KNOWLEDGE_RUNNER_ENABLED: ${APVERO_KNOWLEDGE_RUNNER_ENABLED:-true}
      APVERO_KNOWLEDGE_RUNNER_CLAIM_BATCH: ${APVERO_KNOWLEDGE_RUNNER_CLAIM_BATCH:-4}
      APVERO_KNOWLEDGE_RUNNER_CONCURRENCY: ${APVERO_KNOWLEDGE_RUNNER_CONCURRENCY:-4}
      APVERO_KNOWLEDGE_RUNNER_LEASE_DURATION: ${APVERO_KNOWLEDGE_RUNNER_LEASE_DURATION:-60s}
      APVERO_KNOWLEDGE_RUNNER_POLL_INTERVAL: ${APVERO_KNOWLEDGE_RUNNER_POLL_INTERVAL:-1s}
      APVERO_KNOWLEDGE_RUNNER_BACKOFF_BASE: ${APVERO_KNOWLEDGE_RUNNER_BACKOFF_BASE:-2s}
      APVERO_KNOWLEDGE_RUNNER_BACKOFF_MAXIMUM: ${APVERO_KNOWLEDGE_RUNNER_BACKOFF_MAXIMUM:-5m}
      APVERO_KNOWLEDGE_RUNNER_GRACEFUL_DRAIN: ${APVERO_KNOWLEDGE_RUNNER_GRACEFUL_DRAIN:-30s}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "${APVERO_BIND_ADDRESS:-127.0.0.1}:${APVERO_SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - bash
        - -ec
        - >-
          exec 3<>/dev/tcp/127.0.0.1/8080;
          printf 'GET /actuator/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3;
          head -n 1 <&3 | grep -q ' 200 '
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend
      - knowledge-internal

  ai-worker:
    profiles: [knowledge]
    build:
      context: ../..
      dockerfile: apps/ai-worker/Dockerfile
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m,mode=1777
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: ${APVERO_WORKER_MEMORY_LIMIT:-512m}
    cpus: ${APVERO_WORKER_CPU_LIMIT:-1.0}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=2)"]
      interval: 10s
      timeout: 4s
      retries: 10
    restart: unless-stopped
    networks:
      - knowledge-internal

  console:
    build:
      context: ../..
      dockerfile: apps/console/Dockerfile
    ports:
      - "${APVERO_BIND_ADDRESS:-127.0.0.1}:${APVERO_CONSOLE_PORT:-3000}:3000"
    depends_on:
      platform-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 4s
      retries: 10
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    name: apvero_backend
  knowledge-internal:
    name: apvero_knowledge_internal
    internal: true

volumes:
  apvero_postgres:
    name: apvero_postgres
