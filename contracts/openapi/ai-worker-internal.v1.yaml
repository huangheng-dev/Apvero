openapi: 3.1.0
info:
  title: Apvero AI Worker Internal API
  version: 1.0.0
  description: >-
    Contract-only P2 interface for deterministic, bounded document parsing and chunking.
    It is reachable only from the Java control plane on the internal service network. The
    worker never fetches sources, authorizes users, stores execution state, assigns domain
    identities, resolves secrets, or connects to PostgreSQL.
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
x-apvero-implementation-status: contract-only
x-apvero-exposure: internal-only
servers:
  - url: http://ai-worker:8090
tags:
  - name: Worker health
    description: Internal process liveness without parser or provider probes.
  - name: Document processing
    description: Stateless bounded parsing and deterministic chunking of captured source bytes.
paths:
  /health:
    get:
      security: []
      tags: [Worker health]
      summary: Read worker process health
      operationId: getWorkerHealth
      responses:
        "200":
          description: Process health only; it does not perform a billable or parser probe.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkerHealth" }
  /internal/v1/documents/process:
    post:
      security: []
      tags: [Document processing]
      summary: Parse and deterministically chunk one immutable source snapshot
      description: >-
        The Java control plane has already authenticated the caller, authorized the workspace,
        captured and persisted the source snapshot, validated its size and media type, and
        assigned the Source Revision. The worker processes only the supplied bounded bytes.
      operationId: processDocumentSnapshot
      x-apvero-implementation-status: contract-only
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [requestId, sourceRevisionId, contentDigest, mediaType, processingProfile, content]
              properties:
                requestId: { type: string, format: uuid }
                sourceRevisionId: { type: string, format: uuid }
                contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
                mediaType:
                  type: string
                  enum:
                    - text/plain
                    - text/markdown
                    - application/pdf
                    - application/vnd.openxmlformats-officedocument.wordprocessingml.document
                    - text/html
                processingProfile:
                  type: string
                  const: apvero-default@1.0.0
                content: { type: string, format: binary }
            encoding:
              content:
                contentType: application/octet-stream
      responses:
        "200":
          description: Deterministic parser/chunker output with source anchors.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProcessedDocumentBatch" }
        "400": { $ref: "#/components/responses/WorkerProblem" }
        "413": { $ref: "#/components/responses/WorkerProblem" }
        "415": { $ref: "#/components/responses/WorkerProblem" }
        "422": { $ref: "#/components/responses/WorkerProblem" }
        "503": { $ref: "#/components/responses/WorkerProblem" }
components:
  responses:
    WorkerProblem:
      description: Stable internal failure without raw document content.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/WorkerProblem" }
  schemas:
    WorkerHealth:
      type: object
      additionalProperties: false
      required: [service, status, version]
      properties:
        service: { type: string, const: apvero-ai-worker }
        status: { type: string, const: healthy }
        version: { type: string }
    ProcessedDocumentBatch:
      type: object
      additionalProperties: false
      required: [requestId, sourceRevisionId, contentDigest, processingProfile, parserVersion, chunkerVersion, documents, warnings]
      properties:
        requestId: { type: string, format: uuid }
        sourceRevisionId: { type: string, format: uuid }
        contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        processingProfile: { type: string, const: apvero-default@1.0.0 }
        parserVersion: { type: string, pattern: "^[a-z0-9][a-z0-9.-]*@[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        chunkerVersion: { type: string, pattern: "^[a-z0-9][a-z0-9.-]*@[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        documents:
          type: array
          minItems: 1
          maxItems: 10000
          items: { $ref: "#/components/schemas/ProcessedDocument" }
        warnings:
          type: array
          maxItems: 1000
          items: { $ref: "#/components/schemas/ProcessingWarning" }
    ProcessedDocument:
      type: object
      additionalProperties: false
      required: [ordinal, contentDigest, chunks]
      properties:
        ordinal: { type: integer, minimum: 0 }
        title: { type: [string, "null"], maxLength: 1000 }
        contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        chunks:
          type: array
          maxItems: 100000
          items: { $ref: "#/components/schemas/ProcessedChunk" }
    ProcessedChunk:
      type: object
      additionalProperties: false
      required: [ordinal, text, contentDigest, startOffset, endOffset, anchors]
      properties:
        ordinal: { type: integer, minimum: 0 }
        text: { type: string, minLength: 1, maxLength: 20000 }
        contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        startOffset:
          type: integer
          minimum: 0
          description: Zero-based Unicode code-point offset into normalized document text; inclusive start of the chunk.
        endOffset:
          type: integer
          minimum: 1
          description: Zero-based Unicode code-point offset into normalized document text; exclusive end of the chunk.
        anchors: { $ref: "#/components/schemas/SourceAnchors" }
    SourceAnchors:
      type: object
      additionalProperties: false
      properties:
        page: { type: [integer, "null"], minimum: 1 }
        heading: { type: [string, "null"], maxLength: 1000 }
        paragraph: { type: [integer, "null"], minimum: 1 }
        lineStart: { type: [integer, "null"], minimum: 1 }
        lineEnd: { type: [integer, "null"], minimum: 1 }
    ProcessingWarning:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code:
          type: string
          enum: [EMPTY_PAGE, UNSUPPORTED_ELEMENT_SKIPPED, TRUNCATED_METADATA, NORMALIZED_INVALID_CHARACTER]
        location: { type: [string, "null"], maxLength: 500 }
    WorkerProblem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, retryable, requestId]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        code:
          type: string
          enum:
            - WORKER_INVALID_REQUEST
            - WORKER_CONTENT_DIGEST_MISMATCH
            - WORKER_CONTENT_TOO_LARGE
            - WORKER_UNSUPPORTED_MEDIA_TYPE
            - WORKER_ENCRYPTED_DOCUMENT
            - WORKER_MALFORMED_DOCUMENT
            - WORKER_ARCHIVE_EXPANSION_LIMIT
            - WORKER_PAGE_LIMIT
            - WORKER_PROCESSING_TIMEOUT
            - WORKER_RESOURCE_EXHAUSTED
        retryable: { type: boolean }
        requestId: { type: string, format: uuid }
