        workspaceId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreatePromptRequest:
      type: object
      additionalProperties: false
      required: [slug, name]
      properties:
        slug: { type: string, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$", maxLength: 80 }
        name: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 2000, default: "" }
    PromptVersion:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, promptAssetId, version, systemPrompt, variables, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        promptAssetId: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        systemPrompt: { type: string }
        variables: { type: array, items: { type: string } }
        status: { type: string, enum: [PUBLISHED] }
        createdAt: { type: string, format: date-time }
    CreatePromptVersionRequest:
      type: object
      additionalProperties: false
      required: [systemPrompt]
      properties:
        systemPrompt: { type: string, minLength: 1, maxLength: 50000 }
        variables: { type: array, items: { type: string, pattern: "^[a-zA-Z][a-zA-Z0-9_]{0,63}$" } }
    ApiCredential:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, name, prefix, scopes, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        name: { type: string }
        prefix: { type: string }
        scopes: { type: array, items: { type: string, enum: [read, write, admin] } }
        status: { type: string, enum: [ACTIVE, REVOKED] }
        expiresAt: { type: [string, "null"], format: date-time }
        lastUsedAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    IssuedApiCredential:
      type: object
      additionalProperties: false
      required: [credential, plaintext]
      properties:
        credential: { $ref: "#/components/schemas/ApiCredential" }
        plaintext: { type: string, writeOnly: true }
    KnowledgeBase:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, slug, name, description, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [ACTIVE, ARCHIVED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateKnowledgeBaseRequest:
      type: object
      additionalProperties: false
      required: [slug, name]
      properties:
        slug: { type: string, maxLength: 80, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        name: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 2000, default: "" }
    KnowledgeSourceType:
      type: string
      enum: [TEXT, MARKDOWN, PDF, DOCX, WEB]
    KnowledgeSource:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, knowledgeBaseId, name, sourceType, status, revisionCount, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        knowledgeBaseId: { type: string, format: uuid }
        name: { type: string }
        sourceType: { $ref: "#/components/schemas/KnowledgeSourceType" }
        status: { type: string, enum: [ACTIVE, TOMBSTONED] }
        canonicalUrl: { type: [string, "null"], format: uri, writeOnly: true }
        revisionCount: { type: integer, minimum: 0 }
        latestRevisionId: { type: [string, "null"], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateInlineKnowledgeSourceRequest:
      type: object
      additionalProperties: false
      required: [sourceType, name, content]
      properties:
        sourceType: { type: string, enum: [TEXT, MARKDOWN] }
        name: { type: string, minLength: 1, maxLength: 160 }
        content: { type: string, minLength: 1, maxLength: 5242880 }
    CreateWebKnowledgeSourceRequest:
      type: object
      additionalProperties: false
      required: [sourceType, name, url]
      properties:
        sourceType: { type: string, const: WEB }
        name: { type: string, minLength: 1, maxLength: 160 }
        url: { type: string, format: uri, maxLength: 2048, writeOnly: true }
    CreateInlineKnowledgeSourceRevisionRequest:
      type: object
      additionalProperties: false
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 5242880 }
    KnowledgeSourceRevision:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, sourceId, revision, contentDigest, mediaType, byteSize, snapshotStatus, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        revision: { type: integer, minimum: 1 }
        contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        mediaType: { type: string, maxLength: 160 }
        byteSize: { type: integer, format: int64, minimum: 1 }
        snapshotStatus: { type: string, enum: [SNAPSHOTTED, REJECTED] }
        parserVersion: { type: [string, "null"], maxLength: 120 }
        chunkerVersion: { type: [string, "null"], maxLength: 120 }
        createdAt: { type: string, format: date-time }
    IngestionJobStatus:
      type: string
      description: Source snapshot, parse, and chunk lifecycle only. Embedding and indexing belong to KnowledgeIndexBuildStatus.
      enum: [QUEUED, SNAPSHOTTING, PARSING, CHUNKING, READY, RETRY_WAIT, FAILED, CANCELLED]
    KnowledgeIngestionJob:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, knowledgeBaseId, sourceId, sourceRevisionId, status, currentStep, attemptCount, retryable, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        knowledgeBaseId: { type: string, format: uuid }
        sourceId: { type: string, format: uuid }
        sourceRevisionId:
          type: [string, "null"]
          format: uuid
          description: Null only while a web source is still in SNAPSHOTTING.
        status: { $ref: "#/components/schemas/IngestionJobStatus" }
        currentStep:
          type: string
          description: Current durable source-ingestion step; COMPLETE means deterministic documents and chunks are ready, not that an index exists.
          enum: [SNAPSHOTTING, PARSING, CHUNKING, COMPLETE]
        attemptCount: { type: integer, minimum: 0 }
        retryable: { type: boolean }
        syncOutcome: { type: [string, "null"], enum: [CHANGED, UNCHANGED, null] }
        nextAttemptAt: { type: [string, "null"], format: date-time }
        errorCode: { type: [string, "null"], maxLength: 120 }
        createdAt: { type: string, format: date-time }
        startedAt: { type: [string, "null"], format: date-time }
        completedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
    SourceIngestionReceipt:
      type: object
      additionalProperties: false
      required: [source, revision, job]
      properties:
        source: { $ref: "#/components/schemas/KnowledgeSource" }
        revision:
          description: Null while an asynchronous web snapshot has not produced an immutable revision.
          oneOf:
            - $ref: "#/components/schemas/KnowledgeSourceRevision"
            - type: "null"
        job: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
    SourceSyncReceipt:
      type: object
      additionalProperties: false
      required: [outcome, source, job]
      properties:
        outcome: { type: string, const: SCHEDULED }
        source: { $ref: "#/components/schemas/KnowledgeSource" }
        job: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
    SourceRevisionReceipt:
      type: object
      additionalProperties: false
      required: [outcome, source, revision, job]
      properties:
        outcome: { type: string, enum: [CHANGED, UNCHANGED] }
        source: { $ref: "#/components/schemas/KnowledgeSource" }
        revision:
          description: Null only when the submitted bytes match the latest revision.
          oneOf:
            - $ref: "#/components/schemas/KnowledgeSourceRevision"
            - type: "null"
        job:
          description: Null only when the submitted bytes match and no ingestion work is required.
          oneOf:
            - $ref: "#/components/schemas/KnowledgeIngestionJob"
            - type: "null"
      allOf:
        - if:
            properties: { outcome: { const: CHANGED } }
            required: [outcome]
          then:
            properties:
              revision: { $ref: "#/components/schemas/KnowledgeSourceRevision" }
              job: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
        - if:
            properties: { outcome: { const: UNCHANGED } }
            required: [outcome]
          then:
            properties:
              revision: { type: "null" }
              job: { type: "null" }
    KnowledgeIndex:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, knowledgeBaseId, slug, name, status, versionCount, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        knowledgeBaseId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        status: { type: string, enum: [ACTIVE, ARCHIVED] }
        versionCount: { type: integer, minimum: 0 }
        latestReadyVersionId: { type: [string, "null"], format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateKnowledgeIndexRequest:
      type: object
      additionalProperties: false
      required: [knowledgeBaseId, slug, name]
      properties:
        knowledgeBaseId: { type: string, format: uuid }
        slug: { type: string, maxLength: 80, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        name: { type: string, minLength: 1, maxLength: 160 }
    KnowledgeIndexBuildStatus:
      type: string
      enum: [QUEUED, EMBEDDING, INDEXING, VALIDATING, READY, RETRY_WAIT, FAILED, CANCELLED]
    CreateKnowledgeIndexBuildRequest:
      type: object
      additionalProperties: false
      required: [version, embeddingRouteId, sourceRevisionIds]
      properties:
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        embeddingRouteId: { type: string, format: uuid }
        sourceRevisionIds:
          type: array
          minItems: 1
          maxItems: 10000
          uniqueItems: true
          items: { type: string, format: uuid }
    KnowledgeIndexBuild:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, indexId, version, embeddingRouteId, status, sourceRevisionCount, chunkCount, vectorDimension, attemptCount, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        indexId: { type: string, format: uuid }
        version: { type: string }
        embeddingRouteId: { type: string, format: uuid }
        embeddingRouteReference: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/KnowledgeIndexBuildStatus" }
        sourceRevisionCount: { type: integer, minimum: 1 }
        chunkCount: { type: integer, minimum: 0 }
        vectorDimension: { type: integer, minimum: 1, maximum: 65535 }
        attemptCount: { type: integer, minimum: 0 }
        retryable: { type: boolean, default: false }
        validationDigest: { type: [string, "null"], pattern: "^sha256:[a-f0-9]{64}$" }
        publishedVersionId: { type: [string, "null"], format: uuid }
        errorCode: { type: [string, "null"], maxLength: 120 }
        createdAt: { type: string, format: date-time }
        completedAt: { type: [string, "null"], format: date-time }
        updatedAt: { type: string, format: date-time }
    KnowledgeIndexVersion:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, indexId, buildId, version, reference, embeddingRouteVersion, vectorDimension, sourceRevisionCount, chunkCount, artifactDigest, status, publishedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        indexId: { type: string, format: uuid }
        buildId: { type: string, format: uuid }
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        reference: { type: string, pattern: "^[a-z0-9][a-z0-9._:/-]*@[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        embeddingRouteVersion: { type: string, pattern: "^[a-z0-9][a-z0-9._:/-]*@[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        vectorDimension: { type: integer, minimum: 1, maximum: 65535 }
        sourceRevisionCount: { type: integer, minimum: 1 }
        chunkCount: { type: integer, minimum: 1 }
        artifactDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        status: { type: string, const: READY }
        publishedAt: { type: string, format: date-time }
    RetrievalPolicyVersion:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, slug, version, reference, topK, maxContextTokens, minimumScore, overlapHandling, emptyEvidenceBehavior, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        slug: { type: string }
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        reference: { type: string, pattern: "^[a-z0-9][a-z0-9._:/-]*@[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        topK: { type: integer, minimum: 1, maximum: 100 }
        maxContextTokens: { type: integer, minimum: 128, maximum: 200000 }
        minimumScore: { type: number, minimum: 0, maximum: 1 }
        overlapHandling: { type: string, enum: [KEEP, COLLAPSE_ADJACENT] }
        emptyEvidenceBehavior: { type: string, const: NO_EVIDENCE }
        createdAt: { type: string, format: date-time }
    CreateRetrievalPolicyVersionRequest:
      type: object
      additionalProperties: false
      required: [slug, version, topK, maxContextTokens, minimumScore, overlapHandling]
      properties:
        slug: { type: string, maxLength: 80, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
        topK: { type: integer, minimum: 1, maximum: 100 }
        maxContextTokens: { type: integer, minimum: 128, maximum: 200000 }
        minimumScore: { type: number, minimum: 0, maximum: 1 }
        overlapHandling: { type: string, enum: [KEEP, COLLAPSE_ADJACENT] }
    KnowledgeRetrievalTestRequest:
      type: object
      additionalProperties: false
      required: [indexVersionId, retrievalPolicyVersionId, query]
      properties:
        indexVersionId: { type: string, format: uuid }
        retrievalPolicyVersionId: { type: string, format: uuid }
