    KnowledgeRetrievalHit:
      type: object
      additionalProperties: false
      required: [rank, score, sourceId, sourceRevisionId, documentId, chunkId, contentDigest]
      properties:
        rank: { type: integer, minimum: 1 }
        score: { type: number, minimum: 0, maximum: 1 }
        sourceId: { type: string, format: uuid }
        sourceRevisionId: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        chunkId: { type: string, format: uuid }
        contentDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        content: { type: [string, "null"], maxLength: 20000, description: Bounded and subject to retention/masking policy. }
        sourceTitle: { type: [string, "null"], maxLength: 500 }
        sourceType: { $ref: "#/components/schemas/KnowledgeSourceType" }
        page: { type: [integer, "null"], minimum: 1 }
        heading: { type: [string, "null"], maxLength: 1000 }
        paragraph: { type: [integer, "null"], minimum: 1 }
        lineStart: { type: [integer, "null"], minimum: 1 }
        lineEnd: { type: [integer, "null"], minimum: 1 }
    KnowledgeRetrievalResult:
      type: object
      additionalProperties: false
      required: [status, indexVersionId, retrievalPolicyVersionId, queryDigest, hits, latencyMs]
      properties:
        status: { type: string, enum: [MATCHES, NO_EVIDENCE] }
        indexVersionId: { type: string, format: uuid }
        retrievalPolicyVersionId: { type: string, format: uuid }
        queryDigest: { type: string, pattern: "^sha256:[a-f0-9]{64}$" }
        hits:
          type: array
          maxItems: 100
          items: { $ref: "#/components/schemas/KnowledgeRetrievalHit" }
        latencyMs: { type: integer, format: int64, minimum: 0 }
    ApplicationKnowledgeBinding:
      type: object
      additionalProperties: false
      required: [indexVersionId, indexVersionReference, retrievalPolicyVersionId, retrievalPolicyVersionReference, bindingOrder]
      properties:
        indexVersionId: { type: string, format: uuid }
        indexVersionReference: { type: string }
        retrievalPolicyVersionId: { type: string, format: uuid }
        retrievalPolicyVersionReference: { type: string }
        bindingOrder: { type: integer, minimum: 0, maximum: 15 }
    ReplaceApplicationKnowledgeBindingsRequest:
      type: object
      additionalProperties: false
      required: [bindings]
      properties:
        bindings:
          type: array
          maxItems: 16
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [indexVersionId, retrievalPolicyVersionId]
            properties:
              indexVersionId: { type: string, format: uuid }
              retrievalPolicyVersionId: { type: string, format: uuid }
    RunRetrievalExecution:
      unevaluatedProperties: false
      allOf:
        - $ref: "#/components/schemas/KnowledgeRetrievalResult"
        - type: object
          required: [retrievalId, sequence]
          properties:
            retrievalId: { type: string, format: uuid }
            sequence: { type: integer, minimum: 0 }
    RunRetrievalEvidence:
      type: object
      additionalProperties: false
      required: [runId, retrievals]
      properties:
        runId: { type: string, format: uuid }
        retrievals:
          type: array
          maxItems: 16
          items: { $ref: "#/components/schemas/RunRetrievalExecution" }
    Problem:
      type: object
      required: [type, title, status, detail, code, timestamp]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        code: { type: string }
        timestamp: { type: string, format: date-time }
        fields: { type: object, additionalProperties: { type: string } }
