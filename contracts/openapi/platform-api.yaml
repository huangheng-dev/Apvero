openapi: 3.1.0
info:
  title: Apvero Platform API
  version: 0.1.0
  description: Application-first control and runtime API for the Apvero self-hosted vertical slice.
  license:
    name: Apache License 2.0
    identifier: Apache-2.0
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Platform
    description: Platform identity, edition, locale, and capability discovery.
  - name: Applications
    description: Workspace-scoped AI application lifecycle operations.
  - name: Releases
    description: Immutable, content-addressed application release bundles.
  - name: Runs
    description: Runtime execution and workspace-scoped run ledger operations.
  - name: Models
    description: Provider-neutral model providers, definitions, and immutable route versions.
  - name: Prompts
    description: Prompt assets and immutable Prompt versions.
  - name: Knowledge
    description: Contract-only P2 source, ingestion, immutable index, retrieval, and citation operations.
  - name: Secrets
    description: Metadata-only references to externally injected secrets.
  - name: Access
    description: Once-visible API credentials and access lifecycle.
  - name: Governance
    description: Pre-call budgets, append-only audit events, and retention policy.
  - name: System
    description: Server-confirmed configuration readiness.
paths:
  /api/v1/platform:
    get:
      security: []
      tags: [Platform]
      summary: Get platform information
      operationId: getPlatformInfo
      responses:
        "200":
          description: Platform identity and capabilities.
          content:
            application/json:
              schema:
                type: object
                required: [name, version, status, sourceLocale, supportedLocales, capabilities, serverTime]
                properties:
                  name: { type: string }
                  version: { type: string }
                  status: { type: string }
                  sourceLocale: { type: string }
                  supportedLocales: { type: array, items: { type: string } }
                  capabilities: { type: object, additionalProperties: { type: boolean } }
                  serverTime: { type: string, format: date-time }
  /api/v1/applications:
    get:
      tags: [Applications]
      summary: List AI applications
      operationId: listApplications
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace-scoped applications.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AiApplication" } }
        "400": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Applications]
      summary: Create an AI application
      operationId: createApplication
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateApplicationRequest" }
      responses:
        "201":
          description: Application created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiApplication" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/applications/{applicationId}/releases:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ApplicationId"
    get:
      tags: [Releases]
      summary: List application releases
      operationId: listReleases
      responses:
        "200":
          description: Immutable release bundles for one application.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ReleaseBundle" } }
        "404": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Releases]
      summary: Create an immutable release
      operationId: createRelease
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version: { type: string, pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:-[a-z0-9.-]+)?$" }
                manifest: { $ref: "../schemas/release-bundle-manifest.schema.json" }
      responses:
        "201":
          description: Content-addressed release created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReleaseBundle" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/applications/{applicationId}/runs:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ApplicationId"
    post:
      tags: [Runs]
      summary: Execute a released application
      operationId: executeRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [releaseId, input]
              properties:
                releaseId: { type: string, format: uuid }
                input: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Completed deterministic local run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunRecord" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/runs:
    get:
      tags: [Runs]
      summary: List runtime executions
      operationId: listRuns
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Latest 200 workspace-scoped runs.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/RunRecord" } }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/applications/{applicationId}/draft:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ApplicationId"
    patch:
      tags: [Applications]
      summary: Bind a model route and Prompt version to the application draft
      operationId: bindApplicationDraft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [modelRouteId, promptVersionId]
              properties:
                modelRouteId: { type: string, format: uuid }
                promptVersionId: { type: string, format: uuid }
      responses:
        "200":
          description: Updated application draft.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiApplication" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/applications/{applicationId}/preview-runs:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ApplicationId"
    post:
      tags: [Runs]
      summary: Execute an immutable preview bundle from the current application draft
      operationId: executePreviewRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [input]
              properties:
                input: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Persisted preview run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunRecord" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/usage:
    get:
      tags: [Runs]
      summary: Get normalized workspace usage and cost totals
      operationId: getUsage
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Server-confirmed usage aggregation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UsageSummary" }
        "401": { $ref: "#/components/responses/Problem" }
  /api/v1/budget-policies:
    get:
      tags: [Governance]
      summary: List enforced budget policies
      operationId: listBudgetPolicies
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace-scoped pre-call policies.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/BudgetPolicy" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Governance]
      summary: Create an enforced budget policy
      operationId: createBudgetPolicy
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBudgetPolicyRequest" }
      responses:
        "201":
          description: Policy created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BudgetPolicy" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/audit-events:
    get:
      tags: [Governance]
      summary: List append-only audit events
      operationId: listAuditEvents
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Latest 500 workspace-scoped events without request bodies or secrets.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/AuditEvent" } }
        "401": { $ref: "#/components/responses/Problem" }
  /api/v1/retention-policy:
    get:
      tags: [Governance]
      summary: Get retention and masking policy
      operationId: getRetentionPolicy
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Effective workspace policy.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "401": { $ref: "#/components/responses/Problem" }
    put:
      tags: [Governance]
      summary: Update retention and masking policy
      operationId: updateRetentionPolicy
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateRetentionPolicyRequest" }
      responses:
        "200":
          description: Versioned policy updated.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetentionPolicy" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/model-routes/readiness:
    get:
      tags: [System]
      summary: List model route configuration readiness
      description: Does not issue a billable provider request.
      operationId: listModelRouteReadiness
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Server-confirmed provider, model, route, and Secret Reference readiness.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelRouteReadiness" } }
        "401": { $ref: "#/components/responses/Problem" }
  /api/v1/secrets:
    get:
      tags: [Secrets]
      summary: List Secret References without values
      operationId: listSecretReferences
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Secret Reference metadata.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/SecretReference" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Secrets]
      summary: Create an environment Secret Reference
      operationId: createSecretReference
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, environmentVariable]
              properties:
                name: { type: string, minLength: 1, maxLength: 160 }
                environmentVariable: { type: string, pattern: "^[A-Z][A-Z0-9_]{1,159}$" }
      responses:
        "201":
          description: Secret Reference created; no secret value is returned.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SecretReference" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/model-providers:
    get:
      tags: [Models]
      summary: List model providers
      operationId: listModelProviders
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace model providers.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelProvider" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Models]
      summary: Register a provider endpoint
      operationId: createModelProvider
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelProviderRequest" }
      responses:
        "201":
          description: Provider registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelProvider" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/models:
    get:
      tags: [Models]
      summary: List model definitions
      operationId: listModels
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace model definitions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelDefinition" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Models]
      summary: Register a model definition
      operationId: createModel
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateModelRequest" }
      responses:
        "201":
          description: Model registered.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelDefinition" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/model-routes:
    get:
      tags: [Models]
      summary: List immutable model route versions
      operationId: listModelRoutes
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace route versions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ModelRoute" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Models]
      summary: Publish a new immutable route version
      operationId: createModelRoute
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateModelRouteRequest"
                - $ref: "#/components/schemas/CreateEmbeddingModelRouteRequest"
      responses:
        "201":
          description: Route version published.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ModelRoute" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/prompts:
    get:
      tags: [Prompts]
      summary: List Prompt assets
      operationId: listPrompts
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace Prompt assets.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PromptAsset" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Prompts]
      summary: Create a Prompt asset
      operationId: createPrompt
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePromptRequest" }
      responses:
        "201":
          description: Prompt asset created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromptAsset" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/prompts/{promptId}/versions:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - name: promptId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Prompts]
      summary: List immutable Prompt versions
      operationId: listPromptVersions
      responses:
        "200":
          description: Prompt versions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/PromptVersion" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Prompts]
      summary: Publish an immutable Prompt version
      operationId: createPromptVersion
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePromptVersionRequest" }
      responses:
        "201":
          description: Prompt version published.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PromptVersion" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/api-keys:
    get:
      tags: [Access]
      summary: List API key metadata
      operationId: listApiKeys
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: API key metadata without plaintext.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ApiCredential" } }
        "401": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Access]
      summary: Issue a once-visible API key
      operationId: issueApiKey
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, scopes]
              properties:
                name: { type: string, minLength: 1, maxLength: 160 }
                scopes: { type: array, minItems: 1, uniqueItems: true, items: { type: string, enum: [read, write, admin] } }
                expiresAt: { type: [string, "null"], format: date-time }
      responses:
        "201":
          description: API key plaintext is returned exactly once.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IssuedApiCredential" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/api-keys/{credentialId}:
    delete:
      tags: [Access]
      summary: Revoke an API key
      operationId: revokeApiKey
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: credentialId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: API key revoked. }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-bases:
    get:
      tags: [Knowledge]
      summary: List Knowledge Bases
      operationId: listKnowledgeBases
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace-scoped Knowledge Bases.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeBase" } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Create a Knowledge Base
      operationId: createKnowledgeBase
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKnowledgeBaseRequest" }
      responses:
        "201":
          description: Knowledge Base created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeBase" }
        "400": { $ref: "#/components/responses/Problem" }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-bases/{knowledgeBaseId}/sources:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/KnowledgeBaseId"
    get:
      tags: [Knowledge]
      summary: List sources in a Knowledge Base
      operationId: listKnowledgeSources
      x-apvero-implementation-status: contract-only
      responses:
        "200":
          description: Authorized Knowledge sources.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeSource" } }
        "404": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Add an inline text, Markdown, or public web source
      operationId: createKnowledgeSource
      x-apvero-implementation-status: contract-only
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/CreateInlineKnowledgeSourceRequest"
                - $ref: "#/components/schemas/CreateWebKnowledgeSourceRequest"
              discriminator:
                propertyName: sourceType
      responses:
        "202":
          description: Immutable source snapshot and ingestion job accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceIngestionReceipt" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-bases/{knowledgeBaseId}/source-uploads:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/KnowledgeBaseId"
    post:
      tags: [Knowledge]
      summary: Upload a bounded PDF, DOCX, Markdown, or text source
      operationId: uploadKnowledgeSource
      x-apvero-implementation-status: contract-only
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [name, file]
              properties:
                name: { type: string, minLength: 1, maxLength: 160 }
                file: { type: string, format: binary }
      responses:
        "202":
          description: Immutable upload snapshot and ingestion job accepted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceIngestionReceipt" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
        "415": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-sources/{sourceId}:
    delete:
      tags: [Knowledge]
      summary: Tombstone a source for future index builds
      description: Existing immutable source revisions, index versions, releases, and Runs remain unchanged.
      operationId: tombstoneKnowledgeSource
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceId"
      responses:
        "204": { description: Source tombstoned for future builds. }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-sources/{sourceId}/revisions:
    get:
      tags: [Knowledge]
      summary: List immutable source revisions
      operationId: listKnowledgeSourceRevisions
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceId"
      responses:
        "200":
          description: Immutable revision lineage, newest first.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeSourceRevision" } }
        "404": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Add an immutable revision to an existing text or Markdown source
      operationId: createInlineKnowledgeSourceRevision
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInlineKnowledgeSourceRevisionRequest" }
      responses:
        "202":
          description: New immutable revision and ingestion job accepted, or an audited unchanged result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceRevisionReceipt" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-sources/{sourceId}/revision-uploads:
    post:
      tags: [Knowledge]
      summary: Add an immutable revision to an existing uploaded source
      operationId: uploadKnowledgeSourceRevision
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "202":
          description: New immutable revision and ingestion job accepted, or an audited unchanged result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceRevisionReceipt" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
        "413": { $ref: "#/components/responses/Problem" }
        "415": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-sources/{sourceId}/sync:
    post:
      tags: [Knowledge]
      summary: Resnapshot and ingest a web source
      operationId: synchronizeKnowledgeSource
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceId"
      responses:
        "202":
          description: Resnapshot job scheduled; poll the persisted job for CHANGED or UNCHANGED outcome.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SourceSyncReceipt" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-source-revisions/{revisionId}/content:
    get:
      tags: [Knowledge]
      summary: Read an authorized immutable source snapshot
      description: Streams retained source bytes through the platform; never returns a database, filesystem, or object-store path.
      operationId: getKnowledgeSourceRevisionContent
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeSourceRevisionId"
      responses:
        "200":
          description: Authorized immutable snapshot content.
          headers:
            ETag:
              description: SHA-256 identity of the immutable snapshot.
              schema: { type: string }
            Content-Disposition:
              description: Safe attachment filename generated from source metadata.
              schema: { type: string }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-ingestion-jobs:
    get:
      tags: [Knowledge]
      summary: List persisted ingestion jobs
      operationId: listKnowledgeIngestionJobs
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: knowledgeBaseId
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: status
          in: query
          required: false
          schema: { $ref: "#/components/schemas/IngestionJobStatus" }
      responses:
        "200":
          description: Workspace-scoped persisted jobs.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeIngestionJob" } }
        "401": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-ingestion-jobs/{jobId}:
    get:
      tags: [Knowledge]
      summary: Get ingestion state and retry evidence
      operationId: getKnowledgeIngestionJob
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IngestionJobId"
      responses:
        "200":
          description: Persisted job state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-ingestion-jobs/{jobId}/retry:
    post:
      tags: [Knowledge]
      summary: Retry a retryable failed ingestion job
      operationId: retryKnowledgeIngestionJob
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IngestionJobId"
      responses:
        "202":
          description: Retry scheduled from the last durable step.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
        "409": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-ingestion-jobs/{jobId}/cancel:
    post:
      tags: [Knowledge]
      summary: Cancel a queued or retry-wait ingestion job
      operationId: cancelKnowledgeIngestionJob
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IngestionJobId"
      responses:
        "200":
          description: Job cancellation persisted.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIngestionJob" }
        "409": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-indexes:
    get:
      tags: [Knowledge]
      summary: List Knowledge index identities
      operationId: listKnowledgeIndexes
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace-scoped index identities.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeIndex" } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Create a stable Knowledge index identity
      operationId: createKnowledgeIndex
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKnowledgeIndexRequest" }
      responses:
        "201":
          description: Index identity created; no version is published yet.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIndex" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-indexes/{indexId}/builds:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/KnowledgeIndexId"
    get:
      tags: [Knowledge]
      summary: List persisted builds for one index
      operationId: listKnowledgeIndexBuilds
      x-apvero-implementation-status: contract-only
      responses:
        "200":
          description: Newest builds first.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeIndexBuild" } }
        "404": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Build and validate a candidate immutable index version
      operationId: createKnowledgeIndexBuild
      x-apvero-implementation-status: contract-only
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateKnowledgeIndexBuildRequest" }
      responses:
        "202":
          description: Persisted build accepted; publication occurs only after validation.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIndexBuild" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-index-builds/{buildId}:
    get:
      tags: [Knowledge]
      summary: Get index build state and validation evidence
      operationId: getKnowledgeIndexBuild
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeIndexBuildId"
      responses:
        "200":
          description: Persisted build state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIndexBuild" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-index-builds/{buildId}/retry:
    post:
      tags: [Knowledge]
      summary: Retry a retryable failed index build
      operationId: retryKnowledgeIndexBuild
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeIndexBuildId"
      responses:
        "202":
          description: Retry scheduled from the last durable build step.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIndexBuild" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-index-builds/{buildId}/cancel:
    post:
      tags: [Knowledge]
      summary: Cancel a queued or retry-wait index build
      operationId: cancelKnowledgeIndexBuild
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/KnowledgeIndexBuildId"
      responses:
        "200":
          description: Build cancellation persisted without publishing a version.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeIndexBuild" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-index-versions:
    get:
      tags: [Knowledge]
      summary: List immutable published Knowledge index versions
      operationId: listKnowledgeIndexVersions
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: indexId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Only atomically published READY versions.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/KnowledgeIndexVersion" } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
  /api/v1/retrieval-policy-versions:
    get:
      tags: [Knowledge]
      summary: List immutable retrieval policy versions
      operationId: listRetrievalPolicyVersions
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      responses:
        "200":
          description: Workspace-scoped immutable policies.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/RetrievalPolicyVersion" } }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      tags: [Knowledge]
      summary: Publish an immutable retrieval policy version
      operationId: createRetrievalPolicyVersion
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateRetrievalPolicyVersionRequest" }
      responses:
        "201":
          description: Immutable retrieval policy published.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RetrievalPolicyVersion" }
        "400": { $ref: "#/components/responses/Problem" }
  /api/v1/knowledge-retrieval-tests:
    post:
      tags: [Knowledge]
      summary: Inspect ranked evidence from an exact index and policy version
      operationId: testKnowledgeRetrieval
      x-apvero-implementation-status: contract-only
      parameters: [{ $ref: "#/components/parameters/WorkspaceId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KnowledgeRetrievalTestRequest" }
      responses:
        "200":
          description: Ranked authorized evidence or an explicit empty result.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/KnowledgeRetrievalResult" }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "422": { $ref: "#/components/responses/Problem" }
  /api/v1/applications/{applicationId}/draft/knowledge-bindings:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/ApplicationId"
    get:
      tags: [Applications, Knowledge]
      summary: Get exact Knowledge bindings on an Application draft
      operationId: getApplicationDraftKnowledgeBindings
      x-apvero-implementation-status: contract-only
      responses:
        "200":
          description: Mutable draft selections; production still uses immutable release pins.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ApplicationKnowledgeBinding" } }
        "404": { $ref: "#/components/responses/Problem" }
    put:
      tags: [Applications, Knowledge]
      summary: Replace exact Knowledge bindings on an Application draft
      operationId: replaceApplicationDraftKnowledgeBindings
      x-apvero-implementation-status: contract-only
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplaceApplicationKnowledgeBindingsRequest" }
      responses:
        "200":
          description: Authorized READY versions bound to the mutable draft.
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ApplicationKnowledgeBinding" } }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
        "409": { $ref: "#/components/responses/Problem" }
  /api/v1/runs/{runId}/retrieval:
    get:
      tags: [Runs, Knowledge]
      summary: Inspect retained retrieval evidence for a Run
      operationId: getRunRetrievalEvidence
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Ordered, retention-aware evidence used by the Run.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunRetrievalEvidence" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /api/v1/runs/{runId}/citations:
    get:
      tags: [Runs, Knowledge]
      summary: List citations validated for a grounded Run
      operationId: listRunCitations
      x-apvero-implementation-status: contract-only
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Citations validated against this Run's retained evidence.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "../schemas/citation.v1.schema.json" }
        "403": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Apvero API Key
  parameters:
    WorkspaceId:
      name: X-Apvero-Workspace-Id
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: Explicit workspace security and data scope.
    ApplicationId:
      name: applicationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeBaseId:
      name: knowledgeBaseId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeSourceId:
      name: sourceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeSourceRevisionId:
      name: revisionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IngestionJobId:
      name: jobId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeIndexId:
      name: indexId
      in: path
      required: true
      schema: { type: string, format: uuid }
    KnowledgeIndexBuildId:
      name: buildId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RunId:
      name: runId
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    Problem:
      description: RFC 9457 problem detail with a stable Apvero code.
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    CreateApplicationRequest:
      type: object
      additionalProperties: false
      required: [slug, name, runtimeMode]
      properties:
        slug: { type: string, maxLength: 80, pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$" }
        name: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 2000, default: "" }
        runtimeMode: { $ref: "#/components/schemas/RuntimeMode" }
    RuntimeMode:
      type: string
      enum: [CHAT, RAG, STRUCTURED, TOOL, AGENTIC, WORKFLOW]
    AiApplication:
      type: object
      required: [id, tenantId, workspaceId, slug, name, description, runtimeMode, status, version, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        runtimeMode: { $ref: "#/components/schemas/RuntimeMode" }
        status: { type: string, enum: [DRAFT, TESTING, PUBLISHED, DEPRECATED] }
        draftModelRouteId: { type: [string, "null"], format: uuid }
        draftPromptVersionId: { type: [string, "null"], format: uuid }
        version: { type: integer, format: int64, minimum: 1 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ReleaseBundle:
      type: object
      required: [id, tenantId, workspaceId, applicationId, version, artifactDigest, manifest, status, purpose, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        applicationId: { type: string, format: uuid }
        version: { type: string }
        artifactDigest: { type: string, pattern: "^[a-f0-9]{64}$" }
        manifest: { $ref: "../schemas/release-bundle-manifest.schema.json" }
        status: { type: string, enum: [RELEASED, RETIRED] }
        purpose: { type: string, enum: [PRODUCTION, PREVIEW] }
        expiresAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    RunRecord:
      type: object
      required: [id, tenantId, workspaceId, applicationId, releaseBundleId, status, providerId, actorId, input, output, latencyMs, promptTokens, completionTokens, costMicros, traceId, createdAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        applicationId: { type: string, format: uuid }
        releaseBundleId: { type: string, format: uuid }
        modelRouteId: { type: [string, "null"], format: uuid, description: Null only for pre-P1 migrated history. }
        status: { type: string, enum: [SUCCEEDED, FAILED] }
        providerId: { type: string }
        actorId: { type: string }
        governanceReservationId: { type: [string, "null"], format: uuid, description: Null only for pre-P1 migrated history. }
        input: { type: object, additionalProperties: true }
        output: { type: object, additionalProperties: true }
        latencyMs: { type: integer, format: int64, minimum: 0 }
        promptTokens: { type: integer, minimum: 0 }
        completionTokens: { type: integer, minimum: 0 }
        costMicros: { type: integer, format: int64, minimum: 0 }
        traceId: { type: string }
        failureCategory: { type: [string, "null"] }
        failureMessage: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    UsageSummary:
      type: object
      additionalProperties: false
      required: [runs, successfulRuns, failedRuns, promptTokens, completionTokens, totalTokens, costMicros, averageLatencyMs]
      properties:
        runs: { type: integer, format: int64, minimum: 0 }
        successfulRuns: { type: integer, format: int64, minimum: 0 }
        failedRuns: { type: integer, format: int64, minimum: 0 }
        promptTokens: { type: integer, format: int64, minimum: 0 }
        completionTokens: { type: integer, format: int64, minimum: 0 }
        totalTokens: { type: integer, format: int64, minimum: 0 }
        costMicros: { type: integer, format: int64, minimum: 0 }
        averageLatencyMs: { type: number, minimum: 0 }
    BudgetPolicy:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, name, scopeType, enabled, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        name: { type: string }
        scopeType: { type: string, enum: [WORKSPACE, APPLICATION, MODEL_ROUTE] }
        scopeId: { type: [string, "null"], format: uuid }
        monthlyCostLimitMicros: { type: [integer, "null"], format: int64, minimum: 0 }
        requestsPerMinute: { type: [integer, "null"], minimum: 1 }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateBudgetPolicyRequest:
      type: object
      additionalProperties: false
      required: [name, scopeType]
      properties:
        name: { type: string, minLength: 1, maxLength: 160 }
        scopeType: { type: string, enum: [WORKSPACE, APPLICATION, MODEL_ROUTE] }
        scopeId: { type: [string, "null"], format: uuid }
        monthlyCostLimitMicros: { type: [integer, "null"], format: int64, minimum: 0 }
        requestsPerMinute: { type: [integer, "null"], minimum: 1 }
    AuditEvent:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, occurredAt, actorId, action, resourceType, outcome, details]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        occurredAt: { type: string, format: date-time }
        actorId: { type: string }
        action: { type: string }
        resourceType: { type: string }
        resourceId: { type: [string, "null"] }
        outcome: { type: string, enum: [SUCCEEDED, DENIED, FAILED] }
        sourceIp: { type: [string, "null"] }
        traceId: { type: [string, "null"] }
        details: { type: object, additionalProperties: true }
    RetentionPolicy:
      type: object
      additionalProperties: false
      required: [workspaceId, tenantId, runRetentionDays, auditRetentionDays, retainPayloads, maskSensitiveFields, version, createdAt, updatedAt]
      properties:
        workspaceId: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        runRetentionDays: { type: integer, minimum: 1, maximum: 3650 }
        auditRetentionDays: { type: integer, minimum: 30, maximum: 3650 }
        retainPayloads: { type: boolean }
        maskSensitiveFields: { type: boolean }
        version: { type: integer, format: int64, minimum: 0 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    UpdateRetentionPolicyRequest:
      type: object
      additionalProperties: false
      required: [runRetentionDays, auditRetentionDays, retainPayloads, maskSensitiveFields]
      properties:
        runRetentionDays: { type: integer, minimum: 1, maximum: 3650 }
        auditRetentionDays: { type: integer, minimum: 30, maximum: 3650 }
        retainPayloads: { type: boolean }
        maskSensitiveFields: { type: boolean }
    ModelRouteReadiness:
      type: object
      additionalProperties: false
      required: [routeId, routeReference, providerName, providerType, status, ready, reasonCode]
      properties:
        routeId: { type: string, format: uuid }
        routeReference: { type: string }
        providerName: { type: string }
        providerType: { type: string }
        status: { type: string }
        ready: { type: boolean }
        reasonCode: { type: string }
    SecretReference:
      type: object
      additionalProperties: false
      required: [id, tenantId, workspaceId, name, kind, locator, status, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        workspaceId: { type: string, format: uuid }
        name: { type: string }
        kind: { type: string, enum: [ENVIRONMENT] }
        locator: { type: string }
        status: { type: string, enum: [ACTIVE, DISABLED] }
        rotatedAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ModelProvider:
