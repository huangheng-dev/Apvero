schemaVersion: 1
lastReviewed: 2026-07-22

defaults:
  denyUndeclaredDependencies: true
  forbidCrossModuleDatabaseAccess: true
  forbidInternalPackageImports: true
  internalPackagePattern: "..internal.."

allowed:
  application: []
  release:
    - application
    - capability-registry
    - knowledge
  runtime:
    - application
    - release
    - capability-registry
    - knowledge
  identity: []
  capability-registry:
    - identity
    - governance
  knowledge:
    - identity
    - capability-registry
    - governance
  evaluation:
    - application
    - release
    - runtime
  governance:
    - identity
  extension:
    - capability-registry

forbiddenLibrariesInCore:
  - dev.langchain4j
  - com.alibaba.cloud.ai
  - com.openai
  - com.anthropic

providerAdapterPolicy:
  requiredLocation: adapters
  requiresAdr: true
  mayExposeProviderTypesToCore: false
