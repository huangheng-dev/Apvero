schemaVersion: 1
lastReviewed: 2026-07-22
basePackage: io.apvero.platform

modules:
  - id: identity
    status: baseline
    owns: [tenant, workspace, principal, api-key, role, policy-binding]
    publicApi: io.apvero.platform.identity
    databaseTables: [tenant, workspace, api_credential]

  - id: application
    status: baseline
    implementedOwns: [ai-application, runtime-mode, lifecycle-metadata]
    plannedOwns: [versioned-application-draft, input-contract, output-contract, knowledge-draft-binding]
    publicApi: io.apvero.platform.application
    databaseTables: [ai_application]
    plannedDatabaseTables: [application_draft_knowledge_binding]

  - id: capability-registry
    status: baseline
    implementedOwns: [model-provider, model, model-route, prompt, prompt-version, model-route-readiness, execution-governance-facade]
    plannedOwns: [embedding-route-metadata, tool, mcp-server, memory-provider, evaluator, guardrail]
    publicApi: io.apvero.platform.capability
    databaseTables: [model_provider, model_definition, model_route, prompt_asset, prompt_version]

  - id: release
    status: baseline
    implementedOwns: [immutable-release-bundle, canonical-artifact-digest]
    plannedOwns: [release-bundle-manifest-1.1, immutable-knowledge-binding, release-gate, environment-promotion]
    publicApi: io.apvero.platform.release
    databaseTables: [release_bundle]

  - id: runtime
    status: baseline
    implementedOwns: [run-ledger, trace-identity, actor-identity, governance-reservation-link, token-usage, cost, runtime-metrics, runtime-provider-port]
    plannedOwns: [retrieval-evidence, grounded-answer, citation-validation, normalized-trace-spans, streaming, provider-routing]
    publicApi: io.apvero.platform.runtime
    databaseTables: [ai_run]
    plannedDatabaseTables: [ai_run_retrieval, ai_run_retrieval_hit]

  - id: knowledge
    status: in-progress
    implementationStatus: contract-only
    approvedBy: ADR-0006
    implementedOwns: [knowledge-base, knowledge-source, source-revision, document, chunk, ingestion-job]
    plannedOwns: [retrieval-policy-version, knowledge-index, index-build, immutable-index-version, retrieval-service]
    publicApi: io.apvero.platform.knowledge
    databaseTables: [knowledge_base, knowledge_source, knowledge_source_revision, knowledge_document, knowledge_chunk, knowledge_ingestion_job]
    plannedDatabaseTables: [retrieval_policy_version, knowledge_index, knowledge_index_build, knowledge_index_build_revision, knowledge_index_entry, knowledge_index_version]

  - id: evaluation
    status: planned
    owns: [dataset, case, evaluator, evaluation-run, experiment, release-gate-result]
    publicApi: io.apvero.platform.evaluation

  - id: governance
    status: baseline
    implementedOwns: [secret-reference, budget-policy, rate-limit, execution-reservation, audit-event, retention-policy]
    plannedOwns: [execution-subject, execution-reservation-component]
    publicApi: io.apvero.platform.governance
    databaseTables: [secret_reference, budget_policy, rate_limit_counter, execution_reservation, audit_event, retention_policy]
    plannedDatabaseTables: [execution_reservation_component]

  - id: extension
    status: planned
    owns: [plugin-manifest, compatibility, permission, signature, isolated-runner]
    publicApi: io.apvero.platform.extension
