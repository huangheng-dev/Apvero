name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.3.1"
      - run: gradle test :apps:platform-server:bootJar --no-daemon
      - uses: actions/upload-artifact@v7
        with:
          name: platform-server-jar
          path: apps/platform-server/build/libs/*.jar
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm i18n:check
      - run: pnpm build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-worker
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run pytest -q
      - run: uv run ruff check src tests benchmarks
      - run: uv run pip-audit

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: node -e "for (const f of require('fs').globSync('contracts/**/*.json')) JSON.parse(require('fs').readFileSync(f, 'utf8'));"
      - run: npx --yes @redocly/cli@2.13.0 lint contracts/openapi/platform-api.yaml contracts/openapi/ai-worker-internal.v1.yaml

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose -f deploy/compose/compose.yaml config --quiet
      - run: docker compose --profile knowledge -f deploy/compose/compose.yaml config --quiet

  containers:
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: platform-server-jar
          path: apps/platform-server/build/libs
      - uses: docker/setup-buildx-action@v4
      - name: Build tested platform-server artifact image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/platform-server/Dockerfile
          target: runtime-prebuilt
          load: true
          provenance: false
          tags: apvero/platform-server:ci
          cache-from: type=gha,scope=platform-server-runtime
          cache-to: type=gha,mode=max,scope=platform-server-runtime
      - name: Build ai-worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/ai-worker/Dockerfile
          load: true
          provenance: false
          tags: apvero/ai-worker:ci
          cache-from: type=gha,scope=ai-worker
          cache-to: type=gha,mode=max,scope=ai-worker
