name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "9.3.1"
      - run: gradle test --no-daemon

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm i18n:check
      - run: pnpm build

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-worker
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run pytest -q
      - run: uv run ruff check src tests

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: node -e "for (const f of require('fs').globSync('contracts/**/*.json')) JSON.parse(require('fs').readFileSync(f, 'utf8'));"
      - run: npx --yes @redocly/cli@2.13.0 lint contracts/openapi/platform-api.yaml contracts/openapi/ai-worker-internal.v1.yaml

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker compose -f deploy/compose/compose.yaml config --quiet
