    dataMode: mixed
    backendStatus: baseline
    sections: [kpis, usage-trend, provider-health, recent-runs, recent-releases, alerts]
    interactions: [date-range, workspace-filter, drill-down]
  applications:
    navigationLevel: primary
    dataMode: live
    backendStatus: baseline
