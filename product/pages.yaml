reservedViews:
  agents: {parent: applications, status: preview, legacyRoute: agents}
  workflows: {parent: applications, status: deferred, legacyRoute: workflows}
  tools: {parent: capabilities, status: preview, legacyRoute: tools}
  mcp: {parent: capabilities, status: preview, legacyRoute: mcp}
  memory: {parent: capabilities, status: deferred, legacyRoute: memory}
  feedback: {parent: evaluations, status: preview, legacyRoute: feedback}
  budgets: {parent: usage, status: preview, legacyRoute: budgets}
  members: {parent: accessControl, status: preview, legacyRoute: members}
  roles: {parent: accessControl, status: preview, legacyRoute: roles}
  marketplace: {parent: extensions, status: preview, legacyRoute: marketplace}

prototypeRules:
  - Every demo page displays a Demo data badge.
  - Demo mutations update device-local preview state only and say so explicitly.
  - Live create, release and run actions continue to use the existing server API.
  - Planned behavior never displays a fake server success message.
  - Reserved views remain documented even when they are not primary navigation entries.
  - Every page has loading, empty, error, populated and permission-denied designs before backend implementation.
